<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
<!-- Base Site CSS and Custom Page CSS override -->  
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% if page.custom_css %}
  <link rel="stylesheet" href="{{ page.custom_css | relative_url }}">
  {% endif %}
<!-- RSS Feed -->
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
<link rel="alternate" type="application/rss+xml"  title="{{ site.title }}" href="{{ '/rss.xml'  | relative_url }}">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">

<!-- Open Graph (primary for Facebook, LinkedIn, WhatsApp, Discord, Slack, Telegram, most others) -->
<meta property="og:title" content="{{ page.title | default: site.title }}" />
<meta property="og:description" content="{{ page.description | default: site.description | default: site.description }}" />
<meta property="og:image" content="{{ page.og_image | default: site.social.image | default: '/assets/images/social-card.jpg' | absolute_url }}" />
<meta property="og:image:type" content="image/jpeg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="{{ page.title | default: site.title | append: ' preview' }}" />
<meta property="og:url" content="{{ page.url | absolute_url }}" />
<meta property="og:type" content="{% if page.layout contains 'post' or page.layout == 'article' %}article{% else %}website{% endif %}" />
<meta property="og:site_name" content="{{ site.title }}" />

<!-- Twitter/X Cards (optimal for X, also used as fallback/enhancement by Slack, Discord, etc.) -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ page.title | default: site.title }}" />
<meta name="twitter:description" content="{{ page.description | default: site.description | default: site.description }}" />
<meta name="twitter:image" content="{{ page.og_image | default: site.social.image | default: '/assets/images/social-card.jpg' | absolute_url }}" />
<meta name="twitter:image:alt" content="{{ page.title | default: site.title | append: ' preview' }}" />
<!-- Optional: Add if you have an X account -->
<!-- <meta name="twitter:site" content="@yourhandle" /> -->
<!-- <meta name="twitter:creator" content="@yourhandle" /> -->

<!-- Optional -->
<!-- <meta name="theme-color" content="#your-brand-color" /> -->

</head>
<body>
  <header>
  </header>

<div class="site-header">
  <img src="{{ '/assets/images/lantern.png' | relative_url }}" alt="Lantern icon" class="site-icon" />
  <div class="icon-title">
    <h1 class="site-title">
      Musings <span class="italic-word">from</span> Gravel Hill
    </h1>
    <p class="site-subtitle" id="subtitle"></p>
  </div>
</div>


    <nav class="navbar">
      <a href="/index">Home</a> |
      <a href="/blog">Blog Archive</a> |
<!--       <a href="/manifesto">Manifesto</a> | -->
      <a href="/writings">Writings</a> |
<!--       <a href="/tags">Tags</a> | -->
      <a href="/projects">Projects</a> |
      <a href="/about">About</a>
<!--       <a href="/links">Links</a> | -->

    </nav>


  <main class="container">
    {% if page.title %}
  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
  </header>
  {% endif %}
    {{ content }}
  </main>

  <footer>
    <p>© {{ "now" | date: "%Y" }} Marc MacArthur. All rights reserved.<br>
    From Gravel Hill&trade; • Logo design by Marc MacArthur</p>
  <!-- <p>© Atrion Darnay {{ "now" | date: "%Y" }}. All rights reserved.</p>
    <a href="{{ '/rss.xml' | relative_url }}">RSS</a>  -->
  </footer>

  
<script src="{{ '/assets/js/subtitles.js' | relative_url }}"></script>
</body>
</html>
